_schema_version: 1

server:
  name: Augment Infotech
  description: "Digital Workplace Operating System for Augment Infotech"
  verification_level: high
  explicit_content_filter: all
  default_notifications: only_mentions
  afk_timeout: 1800

# ============================================================
# ROLES — Highest to Lowest hierarchy
# ============================================================
roles:
  # --- Top-Level Roles ---
  - name: Owner
    color: "#FFD700"
    hoist: true
    mentionable: true
    permissions: [administrator]
  - name: Admin
    color: red
    hoist: true
    mentionable: true
    permissions: [administrator]
  - name: Management
    color: purple
    hoist: true
    mentionable: true
    permissions:
      - view_audit_log
      - manage_nicknames
      - view_channel
      - send_messages
      - read_message_history
      - embed_links
      - attach_files
      - add_reactions
      - manage_messages
      - connect
      - speak
      - stream
      - priority_speaker
      - move_members
      - mute_members
      - deafen_members

  # --- Department Roles ---
  - name: Engineering
    color: blue
    hoist: false
    mentionable: true
    permissions:
      - view_channel
      - send_messages
      - read_message_history
      - embed_links
      - attach_files
      - add_reactions
      - create_public_threads
      - send_messages_in_threads
      - use_external_emojis
      - connect
      - speak
      - stream
      - use_application_commands
  - name: AI
    color: dark_blue
    hoist: false
    mentionable: true
