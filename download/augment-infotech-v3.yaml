# ============================================================
# CATEGORIES & CHANNELS
# ============================================================
categories:
  # --- 1. COMPANY (Visible to Everyone) ---
  - name: COMPANY
    description: "Company-wide communication."
    channels:
      - name: announcements
        type: text
        topic: "Official company announcements. Read-only."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management]
      - name: company-news
        type: text
        topic: "Company news and updates."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management, HR]
      - name: events
        type: text
        topic: "Company events and activities."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management, HR]
      - name: achievements
        type: text
        topic: "Company and individual achievements."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Management]
      - name: birthdays
        type: text
        topic: "Employee birthdays and celebrations."
        permissions:
          read: [Employee, Intern]
          write: [HR, Admin]
      - name: introductions
        type: text
        topic: "New employees introduce themselves here."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: policies
        type: text
        topic: "Company policies. Read-only."
        permissions:
          read: [Employee, Intern]
          write: [Admin, HR, Management]
      - name: office-updates
        type: text
        topic: "Office-related updates and announcements."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Operations, Management]
      - name: ask-management
        type: text
        topic: "Ask management questions directly."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: polls
        type: text
        topic: "Company-wide polls and surveys."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management, HR]

  # --- 2. COMMUNITY (Visible to Everyone) ---
  - name: COMMUNITY
    description: "Company culture and social discussions."
    channels:
      - name: general
        type: text
        topic: "General company chat."
        slowmode: 5
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: random
        type: text
        topic: "Off-topic, memes, fun. Keep it SFW."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: lunch-plans
        type: text
        topic: "Lunch plans and food discussions."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: celebrations
        type: text
        topic: "Celebrate wins, milestones, and festivals."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: suggestions
        type: text
        topic: "Company improvement suggestions."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: recognition
        type: text
        topic: "Peer recognition and kudos."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: wellness
        type: text
        topic: "Mental and physical wellness discussions."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: anonymous-feedback
        type: text
        topic: "Anonymous feedback for management."
        permissions:
          read: [Management, Admin]
          write: [Employee, Intern]

  # --- 3. KNOWLEDGE (Visible to Everyone) ---
  - name: KNOWLEDGE
    description: "Permanent company knowledge base."
    channels:
      - name: company-docs
        type: text
        topic: "Company documentation links."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management]
      - name: employee-handbook
        type: text
        topic: "Employee handbook and guides."
        permissions:
          read: [Employee, Intern]
          write: [HR, Admin]
      - name: coding-guidelines
        type: text
        topic: "Coding standards and best practices."
        permissions:
          read: [Employee, Intern]
          write: [Engineering, Admin]
      - name: architecture
        type: text
        topic: "System architecture and design docs."
        permissions:
          read: [Employee, Intern]
          write: [Engineering, Admin]
      - name: deployment-guide
        type: text
        topic: "Deployment procedures and guides."
        permissions:
          read: [Employee, Intern]
          write: [DevOps, Engineering, Admin]
      - name: templates
        type: text
        topic: "Document and code templates."
        permissions:
          read: [Employee, Intern]
          write: [Employee]
      - name: training-recordings
        type: text
        topic: "Training session recordings and slides."
        permissions:
          read: [Employee, Intern]
          write: [Admin, Management, HR]
      - name: runbooks
        type: text
        topic: "Operational runbooks and playbooks."
        permissions:
          read: [Employee, Intern]
          write: [DevOps, Admin]
      - name: faq
        type: text
        topic: "Frequently asked questions."
        permissions:
          read: [Employee, Intern]
          write: [Admin, HR]

  # --- 4. OPERATIONS (Visible to Everyone) ---
  - name: OPERATIONS
    description: "Company operations and support."
    channels:
      - name: daily-standup
        type: text
        topic: "Daily async standup updates."
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: helpdesk
        type: forum
        topic: "IT support tickets. Post your issue here."
        available_tags: [IT, Hardware, Software, Network, Account, Urgent]
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
      - name: office-ops
        type: text
        topic: "Office operations and facilities."
        permissions:
          read: [Employee, Intern]
          write: [Operations, Admin]
      - name: leave-requests
        type: text
        topic: "Leave requests and approvals."
        permissions:
          read: [Employee, HR, Management, Admin]
          write: [Employee, Intern]

  # --- 5. VOICE (Visible to Everyone) ---
  - name: VOICE
    description: "Voice channels for meetings and hangouts."
    channels:
      - name: All Hands
        type: stage_voice
        permissions:
          read: [Employee, Intern]
          write: [Management, Admin]
          connect: [Employee, Intern]
          speak: [Management, Admin]
      - name: Daily Standup
        type: voice
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
          connect: [Employee, Intern]
          speak: [Employee, Intern]
      - name: Interview Room
        type: voice
        permissions:
          read: [HR, Management, Admin]
          write: [HR, Management, Admin]
          connect: [HR, Management, Admin]
          speak: [HR, Management, Admin]
      - name: Meeting Room 1
        type: voice
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
          connect: [Employee, Intern]
          speak: [Employee, Intern]
      - name: Meeting Room 2
        type: voice
        permissions:
          read: [Employee, Intern]
          write: [Employee, Intern]
          connect: [Employee, Intern]
          speak: [Employee, Intern]
      - name: Focus Room
