[book]
title = "GuildForge Documentation"
description = "Infrastructure as Code for Discord Workspaces"
language = "en"
multilingual = false
src = "src"

[output.html]
git-repository-url = "https://github.com/your-org/guildforge"
edit-url-template = "https://github.com/your-org/guildforge/edit/main/docs-site/src/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
